<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg-cv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0e12"/>
      <stop offset="100%" stop-color="#1a1d26"/>
    </linearGradient>
    <linearGradient id="gold-cv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c878"/>
      <stop offset="100%" stop-color="#8a7842"/>
    </linearGradient>
    <linearGradient id="olive-cv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8b87a"/>
      <stop offset="100%" stop-color="#5a6642"/>
    </linearGradient>
    <radialGradient id="glow-cv" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg-cv)"/>
  <circle cx="200" cy="200" r="180" fill="url(#glow-cv)"/>
  <!-- aro circular -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#gold-cv)" stroke-width="3" stroke-dasharray="4 4" opacity="0.6"/>
  <!-- flecha circular (economía circular) -->
  <g transform="translate(200,200)">
    <path d="M-100 0 A100 100 0 1 1 -50 86" fill="none" stroke="url(#gold-cv)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-65 75 L-50 86 L-50 70 Z" fill="url(#gold-cv)"/>
    <!-- flecha interior -->
    <path d="M100 0 A100 100 0 1 1 50 -86" fill="none" stroke="url(#olive-cv)" stroke-width="5" stroke-linecap="round"/>
    <path d="M65 -75 L50 -86 L50 -70 Z" fill="url(#olive-cv)"/>
  </g>
  <!-- edificio en el centro -->
  <g transform="translate(170,170)">
    <path d="M0 60 L0 30 L20 10 L40 10 L40 30 L60 30 L60 60 Z" fill="none" stroke="url(#gold-cv)" stroke-width="2.5"/>
    <rect x="8" y="40" width="14" height="20" fill="url(#gold-cv)" opacity="0.4"/>
    <rect x="38" y="40" width="14" height="20" fill="url(#gold-cv)" opacity="0.4"/>
  </g>
  <text x="50%" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#c9a961" letter-spacing="3">DESIMPLANTACIÓN CIRCULAR</text>
</svg>
