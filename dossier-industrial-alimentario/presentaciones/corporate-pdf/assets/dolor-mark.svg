<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg-do" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0e12"/>
      <stop offset="100%" stop-color="#1a1d26"/>
    </linearGradient>
    <linearGradient id="red-do" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg-do)"/>
  <!-- gráfica descendente -->
  <g transform="translate(50,60)">
    <line x1="0" y1="280" x2="300" y2="280" stroke="#3a4150" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="280" stroke="#3a4150" stroke-width="1.5"/>
    <!-- barras descendentes -->
    <rect x="20" y="20" width="40" height="260" fill="url(#red-do)" opacity="0.85"/>
    <rect x="80" y="80" width="40" height="200" fill="url(#red-do)" opacity="0.7"/>
    <rect x="140" y="140" width="40" height="140" fill="url(#red-do)" opacity="0.6"/>
    <rect x="200" y="200" width="40" height="80" fill="url(#red-do)" opacity="0.5"/>
    <rect x="260" y="240" width="40" height="40" fill="url(#red-do)" opacity="0.4"/>
    <!-- línea de tendencia -->
    <path d="M40 30 L100 90 L160 150 L220 210 L280 250" fill="none" stroke="#f87171" stroke-width="2.5" stroke-dasharray="6 4"/>
    <!-- flecha hacia abajo -->
    <path d="M260 250 L290 270 L275 280 Z" fill="#f87171"/>
  </g>
  <text x="50%" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#f87171" letter-spacing="3">EBITDA BAJA · ACTIVOS SIN REEMPLAZO</text>
</svg>
