# HERMES Dossier Industrial Alimentario — nginx location block
# Inserted before the catch-all "location /" in /etc/nginx/sites-enabled/hermes-api
# Proxies /dossier/ → Next.js on port 3002 (with basePath /dossier).

    # === HERMES-DOSSIER — A&B desimplantación OSINT ===
    # Legacy HTML (PRESENTACION-INTERACTIVA.html) served directly from disk,
    # because the Next.js app reads it via <iframe> at /dossier/legacy-raw/
    location /dossier/legacy-raw/ {
        alias /opt/hermes-dossier/legacy/;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Next.js _next assets for the dossier app (cached 1d)
    location /dossier/_next/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Dossier app (Next.js basePath=/dossier) — handles /dossier/, /dossier/hallazgos,
    # /dossier/empresas, /dossier/eventos, /dossier/contactos, /dossier/agentes,
    # /dossier/legacy, /dossier/api/*, /dossier/api/health, /dossier/api/contactos/export.csv
    location /dossier/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }
